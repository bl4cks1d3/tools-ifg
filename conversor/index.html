<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Conversor Numérico Completo</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    padding: 30px;
}



.box {
    background: white;
    padding: 20px;
    border-radius: 8px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

input, select, button {
    padding: 8px;
    font-size: 16px;
    margin: 5px 0;
}

button {
    background: #1f3c88;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover { background: #142850; }

.resultado {
    background: #e6ecff;
    padding: 15px;
    margin-top: 10px;
    border-radius: 6px;
    white-space: pre-line;
}

table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 10px;
}

th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}

th {
    background: #1f3c88;
    color: white;
}
header{
    background:#1e3a8a;
    color:white;
    padding:20px;
    text-align:center;
}

header h1{
    margin:0;
}
</style>
</head>

<body>
<header>
<h1>Conversor Numérico com Cálculo Completo</h1>
<p>Portal de utilidades acadêmicas desenvolvidas por Wesley Cardoso @bl4cks1d3</p>
<a href="../index.html" style="color:white; text-decoration:none; font-weight:bold;">Voltar ao Início</a>
</header>

<div class="box">

<label>Número:</label><br>
<input type="text" id="numero"><br>

<label>Base de origem:</label><br>
<select id="origem">
    <option value="10">Decimal</option>
    <option value="2">Binário</option>
    <option value="16">Hexadecimal</option>
</select><br>

<label>Converter para:</label><br>
<select id="destino">
    <option value="2">Binário</option>
    <option value="10">Decimal</option>
    <option value="16">Hexadecimal</option>
</select><br>

<button onclick="converter()">Converter</button>

<div class="resultado" id="resultado"></div>

</div>

<div class="box">
<button onclick="gerarTabela()">Gerar Tabela (0 a 32)</button>
<div id="tabela"></div>
</div>

<script src="script.js"></script>




</body>
</html>
