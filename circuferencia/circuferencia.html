<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Equação da Circunferência</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
width:1100px;
margin:auto;
padding:20px;
}

.box{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 0 8px rgba(0,0,0,0.2);
}

svg{
background:white;
border:1px solid #ccc;
}

input{
width:70px;
padding:5px;
margin:5px;
}

button{
padding:8px 12px;
background:#3498db;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

.result{
margin-top:15px;
background:#eef;
padding:10px;
border-radius:6px;
line-height:1.6;
}

</style>

</head>

<body>

<header>
Equação da Circunferência - Resolução Visual
<p>Portal de utilidades acadêmicas desenvolvidas por Wesley Cardoso @bl4cks1d3</p>
<a href="../index.html" style="color:white; text-decoration:none; font-weight:bold;">Voltar ao Início</a>

</header>

<div class="container">

<div class="box">

<h2>Resolver equação da circunferência</h2>

Centro (a,b)

<input id="a" value="-3">
<input id="b" value="1">

Raio r

<input id="r" value="3">

<button onclick="resolver()">Desenhar e Resolver</button>

<br><br>

<svg id="plano" width="800" height="500"></svg>

<div id="resultado" class="result"></div>

</div>

</div>

<script>

let escala=40
let cx=400
let cy=250

function px(x){return cx + x*escala}
function py(y){return cy - y*escala}

function desenharPlano(){

let svg=document.getElementById("plano")
svg.innerHTML=""

for(let x=-10;x<=10;x++){

svg.innerHTML+=`<line x1="${px(x)}" y1="0" x2="${px(x)}" y2="500"
stroke="#aaa" stroke-dasharray="4"/>`

svg.innerHTML+=`<text x="${px(x)+3}" y="${cy+15}" font-size="12">${x}</text>`
}

for(let y=-6;y<=6;y++){

svg.innerHTML+=`<line x1="0" y1="${py(y)}" x2="800" y2="${py(y)}"
stroke="#aaa" stroke-dasharray="4"/>`

if(y!=0)
svg.innerHTML+=`<text x="${cx+5}" y="${py(y)-5}" font-size="12">${y}</text>`
}

svg.innerHTML+=`<line x1="0" y1="${cy}" x2="800" y2="${cy}" stroke="black"/>`
svg.innerHTML+=`<line x1="${cx}" y1="0" x2="${cx}" y2="500" stroke="black"/>`

}

function resolver(){

desenharPlano()

let a=Number(document.getElementById("a").value)
let b=Number(document.getElementById("b").value)
let r=Number(document.getElementById("r").value)

let svg=document.getElementById("plano")

svg.innerHTML+=`
<circle 
cx="${px(a)}" 
cy="${py(b)}" 
r="${r*escala}" 
fill="none" 
stroke="purple" 
stroke-width="2"/>
`

svg.innerHTML+=`
<circle 
cx="${px(a)}" 
cy="${py(b)}" 
r="5" 
fill="red"/>
`

svg.innerHTML+=`
<text x="${px(a)+6}" y="${py(b)-6}">
C(${a},${b})
</text>
`

svg.innerHTML+=`
<line
x1="${px(a)}"
y1="${py(b)}"
x2="${px(a+r)}"
y2="${py(b)}"
stroke="orange"
stroke-width="2"/>
`

let r2=r*r

let parteX = ""
let parteY = ""

if(a === 0){
parteX = "x²"
}else{
parteX = `(x ${a>=0?'-':'+'} ${Math.abs(a)})²`
}

if(b === 0){
parteY = "y²"
}else{
parteY = `(y ${b>=0?'-':'+'} ${Math.abs(b)})²`
}

let equacaoSub = `(x - (${a}))² + (y - (${b}))² = ${r}²`

let equacaoFinal = `${parteX} + ${parteY} = ${r2}`

document.getElementById("resultado").innerHTML = `

<b>Passo 1 — identificar centro e raio</b>

<br>

Centro = (${a},${b})

<br>

Raio = ${r}

<br><br>

<b>Passo 2 — fórmula da circunferência</b>

<br>

(x-a)² + (y-b)² = r²

<br><br>

<b>Passo 3 — substituir valores</b>

<br>

${equacaoSub}

<br><br>

<b>Equação final simplificada</b>

<br>

${equacaoFinal}

`
}
desenharPlano()
resolver()

</script>

</body>

</html>
