<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Programação em Papel Quadriculado</title>

    <style>
        header{
    background:#1e3a8a;
    color:white;
    padding:20px;
    text-align:center;
}

header h1{
    margin:0;
}
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Segoe UI, Arial;
        }

        body {
    background: #1e3a8a;
    color: white;
    min-height: 100vh;
    padding: 20px;

    display: flex;
    flex-direction: column;   /* resolve o problema */
    align-items: center;      /* centraliza o conteúdo */
}

        .app {
            display: grid;
            grid-template-columns: 260px auto 300px;
            gap: 25px;
            width: 100%;
            max-width: 1300px;
        }

        .panel {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        h3 {
            margin-bottom: 10px;
        }

        button,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: none;
            border-radius: 6px;
            background: #1e3a8a;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #2563eb;
        }

        #grid {
            display: grid;
            justify-content: center;
            background: #1e3a8a;
            padding: 20px;
            border-radius: 10px;
            grid-template-columns: repeat(10, 40px);
            grid-template-rows: repeat(10, 40px);
            gap: 0;
        }

        .cell {
            width: 40px;
            height: 40px;
            border: 1px solid #1e293b;
            background: white;
            cursor: pointer;
            transition: 0.15s;
        }



        .cell:hover {
            transform: scale(1.05);
        }

        .cursor {
            outline: 3px solid red;
        }

        #logTable {
            width: 100%;
            border-collapse: collapse;
            background: white;
            color: black;
        }

        #logTable th {
            background: #3b82f6;
            color: white;
        }

        #logTable td,
        #logTable th {
            padding: 6px;
            border: 1px solid #ccc;
            text-align: center;
        }

        @media(max-width:900px) {

            .app {
                grid-template-columns: 1fr;
            }

        }
    </style>
</head>

<body>
<header>
<h1>Simulador de Papel Quadriculado</h1>
<p>Movimentos com teclado: Setas do teclado e espaço para pintar</p>

<p>Portal de utilidades acadêmicas desenvolvidas por Wesley Cardoso @bl4cks1d3</p>

<br>
<a href="../index.html" style="color:white; text-decoration:none; font-weight:bold;">Voltar ao Início</a>
</header>

    <div class="app">

        <div class="panel">

            <h3>Grid</h3>

            <select id="gridSize">
                <option value="5">5 x 5</option>
                <option value="10">10 x 10</option>
            </select>

            <button onclick="createGrid()">Criar Grid</button>

            <h3>Gabaritos</h3>

            <select id="template">
                <option value="none">Nenhum</option>
                <option value="t1">Padrão 1</option>
                <option value="t2">Padrão 2</option>
                <option value="t3">Padrão 3</option>
                <option value="t4">Padrão 4</option>
                <option value="t5">Padrão 5</option>
                <option value="t6">Padrão 6</option>
                <option value="t7">Padrão 7</option>
                <option value="t8">Padrão 8</option>
                <option value="t9">Padrão 9</option>
                <option value="t10">Padrão 10</option>
                <option value="t11">Padrão 11</option>
                <option value="t12">Padrão 12</option>
                <option value="random">Aleatório</option>
            </select>

            <button onclick="applyTemplate()">Aplicar</button>

            <h3>Movimento</h3>

            <button onclick="move(1,0,'Direita')">➡️</button>
            <button onclick="move(-1,0,'Esquerda')">⬅️</button>
            <button onclick="move(0,-1,'Cima')">⬆️</button>
            <button onclick="move(0,1,'Baixo')">⬇️</button>

            <h3>Ações</h3>

            <button onclick="paint()">Pintar</button>
            <button onclick="changeColor()">Trocar Cor</button>
            <button onclick="solvePattern()">Resolver</button>
            <button onclick="clearGrid()">Limpar</button>

        </div>

        <div id="grid"></div>

        <div class="panel">

            <h3>Log de Ações</h3>

            <table id="logTable">

                <thead>
                    <tr>
                        <th>#</th>
                        <th>Ação</th>
                        <th>X</th>
                        <th>Y</th>
                    </tr>
                </thead>

                <tbody></tbody>

            </table>

        </div>

    </div>

<script src="script.js"></script>

</body>

</html>
